<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EChartsLib Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1e; }
    #ec_chart { background: #2a2a2a; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  }
  @media (prefers-color-scheme: light) {
    body { background: #fafafa; }
    #ec_chart { background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         display: flex; justify-content: center;
         align-items: center; min-height: 100vh; padding: 20px; }
  #ec_chart { width: 100%; height: 550px; border-radius: 8px; }
</style>
</head>
<body>
<div id="ec_chart"></div>
<script>

(function() {
  // ---------- detect dark mode ----------
  var FORCE = "auto";          // "auto" | "light" | "dark"
  var isDark;
  if (FORCE === "dark")       isDark = true;
  else if (FORCE === "light") isDark = false;
  else                        isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

  // ---------- colour maps ----------
  var LIGHT_TEXT = {"#666":1, "#333":1, "#666666":1, "#333333":1};
  var LIGHT_GRID = {"#eee":1, "#eeeeee":1, "#f0f0f0":1};
  var DARK_TEXT  = "#ccc";
  var DARK_GRID  = "#555";
  var DARK_TITLE = "#eee";
  var DARK_SUBTITLE = "#bbb";

  // ---------- recursive patcher ----------
  function patchColors(obj) {
    if (!obj || typeof obj !== "object") return;
    if (Array.isArray(obj)) { obj.forEach(patchColors); return; }
    for (var k in obj) {
      if (!obj.hasOwnProperty(k)) continue;
      var v = obj[k];
      if (typeof v === "string") {
        var lv = v.toLowerCase();
        if (k === "color" && LIGHT_TEXT[lv])         obj[k] = DARK_TEXT;
        else if (k === "color" && LIGHT_GRID[lv])    obj[k] = DARK_GRID;
        else if (k === "borderColor" && LIGHT_GRID[lv]) obj[k] = DARK_GRID;
      } else if (typeof v === "object") {
        patchColors(v);
      }
    }
  }

  // ---------- patch title specifically ----------
  function patchTitle(t) {
    if (!t) return;
    if (t.textStyle)    t.textStyle.color    = t.textStyle.color    || DARK_TITLE;
    else                t.textStyle = {color: DARK_TITLE};
    if (t.subtextStyle) t.subtextStyle.color = t.subtextStyle.color || DARK_SUBTITLE;
  }

  // ---------- patch splitLine / grid line colours ----------
  function patchGridLines(axes) {
    if (!axes) return;
    var arr = Array.isArray(axes) ? axes : [axes];
    arr.forEach(function(ax) {
      if (ax.splitLine && ax.splitLine.lineStyle) {
        var c = (ax.splitLine.lineStyle.color || "").toLowerCase();
        if (LIGHT_GRID[c]) ax.splitLine.lineStyle.color = DARK_GRID;
      }
    });
  }

  // ---------- apply ----------
  var option  = {
  "title": {
    "text": "KPI Dashboard: Revenue & Margin",
    "left": "center",
    "textStyle": {
      "fontSize": 18,
      "fontFamily": "sans-serif"
    },
    "subtext": "Jan 2024 \u2013 Dec 2025",
    "subtextStyle": {
      "fontSize": 12
    }
  },
  "color": [
    "#893448",
    "#d95850",
    "#eb8146",
    "#ffb248",
    "#f2d643",
    "#ebdba4"
  ],
  "tooltip": {
    "trigger": "axis",
    "axisPointer": {
      "type": "cross"
    },
    "confine": true,
    "appendTo": "body"
  },
  "legend": {
    "show": true,
    "orient": "horizontal",
    "top": 50,
    "data": [
      "Revenue",
      "Margin"
    ]
  },
  "grid": {
    "left": 70,
    "right": 86,
    "top": 50,
    "bottom": 60,
    "containLabel": true
  },
  "xAxis": {
    "type": "category",
    "data": [
      "Jan 2024",
      "Feb 2024",
      "Mar 2024",
      "Apr 2024",
      "May 2024",
      "Jun 2024",
      "Jul 2024",
      "Aug 2024",
      "Sep 2024",
      "Oct 2024",
      "Nov 2024",
      "Dec 2024",
      "Jan 2025",
      "Feb 2025",
      "Mar 2025",
      "Apr 2025",
      "May 2025",
      "Jun 2025",
      "Jul 2025",
      "Aug 2025",
      "Sep 2025",
      "Oct 2025",
      "Nov 2025",
      "Dec 2025"
    ],
    "axisLabel": {
      "rotate": 45,
      "fontSize": 12,
      "color": "#666"
    },
    "axisTick": {
      "show": false
    }
  },
  "yAxis": [
    {
      "type": "value",
      "splitLine": {
        "show": true,
        "lineStyle": {
          "color": "#f0f0f0"
        }
      },
      "axisLabel": {
        "fontSize": 12,
        "color": "#666"
      },
      "name": "Cumulative Revenue ($K)"
    },
    {
      "type": "value",
      "splitLine": {
        "show": false
      },
      "axisLabel": {
        "fontSize": 12,
        "color": "#666"
      },
      "name": "Margin %"
    }
  ],
  "series": [
    {
      "type": "bar",
      "label": {
        "show": false,
        "position": "top",
        "formatter": "{c}",
        "fontSize": 12,
        "color": "#333"
      },
      "itemStyle": {
        "borderRadius": 4
      },
      "yAxisIndex": 0,
      "name": "Revenue",
      "data": [
        100.0,
        100.0,
        127.3047,
        177.1061,
        248.8518,
        303.3241,
        340.8756,
        366.9332,
        426.1348,
        471.3708,
        520.2609,
        561.1314,
        581.1333,
        644.757,
        702.0016,
        755.3298,
        815.2903,
        846.6032,
        926.1363,
        971.3566,
        1026.7531,
        1087.9457,
        1097.0728,
        1172.2035
      ]
    },
    {
      "type": "line",
      "smooth": true,
      "connectNulls": false,
      "showSymbol": true,
      "symbol": "circle",
      "symbolSize": 8,
      "lineStyle": {
        "width": 3
      },
      "yAxisIndex": 1,
      "name": "Margin",
      "data": [
        20.148,
        25.1606,
        26.4894,
        24.8028,
        19.1436,
        24.0177,
        33.7986,
        21.2351,
        15.4601,
        19.9819,
        19.2197,
        19.0525,
        28.4199,
        29.8449,
        32.091,
        16.687,
        18.3992,
        34.5182,
        15.0479,
        24.1534,
        16.0085,
        28.0364,
        34.926,
        24.2637
      ]
    }
  ],
  "toolbox": {
    "show": true,
    "right": 10,
    "top": 10,
    "feature": {
      "saveAsImage": {
        "show": true,
        "type": "png",
        "name": "kpi_dashboard",
        "pixelRatio": 3,
        "backgroundColor": "#ffffff"
      },
      "restore": {
        "show": true
      }
    }
  },
  "dataZoom": [
    {
      "type": "inside",
      "start": 0,
      "end": 100,
      "orient": "horizontal"
    },
    {
      "type": "slider",
      "start": 0,
      "end": 100,
      "orient": "horizontal"
    }
  ]
};
  var themeToUse = null;   // null or "dark" etc

  if (isDark && !themeToUse) {
    themeToUse = "dark";
    patchColors(option);

    // Patch title
    if (option.title) patchTitle(option.title);
    // Patch axes
    patchGridLines(option.xAxis);
    patchGridLines(option.yAxis);

    // Remove hardcoded light backgrounds so the dark theme shines through
    if (option.backgroundColor) {
      var bg = option.backgroundColor.toLowerCase();
      if (bg === "#fff" || bg === "#ffffff" || bg === "#fafafa" || bg === "white")
        delete option.backgroundColor;
    }

    // Timeline: patch baseOption if present
    if (option.baseOption) {
      patchColors(option.baseOption);
      if (option.baseOption.title) patchTitle(option.baseOption.title);
      if (option.baseOption.backgroundColor) {
        var bbg = option.baseOption.backgroundColor.toLowerCase();
        if (bbg === "#fff" || bbg === "#ffffff" || bbg === "#fafafa" || bbg === "white")
          delete option.baseOption.backgroundColor;
      }
    }
    if (option.options) {
      option.options.forEach(function(fo) {
        patchColors(fo);
        patchGridLines(fo.xAxis);
        patchGridLines(fo.yAxis);
      });
    }
  }

  // ---------- init chart ----------
  var chart = echarts.init(
    document.getElementById("ec_chart"),
    themeToUse,
    { renderer: "canvas" }
  );
  chart.setOption(option);
  window.addEventListener("resize", function() { chart.resize(); });

  // ---------- live theme switch (OS toggle) ----------
  if (FORCE === "auto" && window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function() {
      location.reload();
    });
  }
})();

</script>
</body>
</html>
